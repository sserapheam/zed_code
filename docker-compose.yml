version: '3.8'

services:
  # PostgreSQL база данных
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: coding_platform
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Только localhost на VPS — для DBeaver через SSH-туннель (не открыт в интернет)
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d coding_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis для очередей и кэша
  redis:
    image: redis:7-alpine
    # Не публикуем Redis наружу
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Celery worker для выполнения кода
  celery_worker:
    build:
      context: .
      dockerfile: docker/executor/Dockerfile
    depends_on:
      - redis
      - postgres
    environment:
      - DOCKER_USE_POOL=${DOCKER_USE_POOL}
      - DOCKER_AUTO_REMOVE=${DOCKER_AUTO_REMOVE}
      - USE_DOCKER=${USE_DOCKER}
      - DOCKER_POOL_SIZE=${DOCKER_POOL_SIZE}
      - DOCKER_WARMUP=${DOCKER_WARMUP}
      - DOCKER_HOST=${DOCKER_HOST}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coding_platform
      - DB_USER=admin
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_URL=redis://redis:6379/0
      - DATABASE_URL=postgresql://admin:${DB_PASSWORD}@postgres:5432/coding_platform
    volumes:
      - ./celery_app.py:/app/celery_app.py
      - /var/run/docker.sock:/var/run/docker.sock
    command: celery -A celery_app worker --loglevel=info --concurrency=2

  # Flask приложение
  web:
    build: .
    depends_on:
      - postgres
      - redis
    environment:
      - DOCKER_USE_POOL=${DOCKER_USE_POOL}
      - DOCKER_AUTO_REMOVE=${DOCKER_AUTO_REMOVE}
      - USE_DOCKER=${USE_DOCKER}
      - DOCKER_POOL_SIZE=${DOCKER_POOL_SIZE}
      - DOCKER_WARMUP=${DOCKER_WARMUP}
      - DOCKER_HOST=${DOCKER_HOST}
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=coding_platform
      - DB_USER=admin
      - DB_PASSWORD=${DB_PASSWORD}
      - DATABASE_URL=postgresql://admin:${DB_PASSWORD}@postgres:5432/coding_platform
      - REDIS_URL=redis://redis:6379/0
      - FLASK_SECRET=${FLASK_SECRET}
      - REQUIRE_FLASK_SECRET=true
      - FLASK_ENV=production
      - MAIL_SERVER=${MAIL_SERVER:-}
      - MAIL_PORT=${MAIL_PORT:-465}
      - MAIL_USERNAME=${MAIL_USERNAME:-}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-}
      - MAIL_FROM=${MAIL_FROM:-}
      - MAIL_FROM_NAME=${MAIL_FROM_NAME:-zedcode}
      - MAIL_USE_SSL=${MAIL_USE_SSL:-true}
      - MAIL_USE_TLS=${MAIL_USE_TLS:-false}
      - ALLOW_DEV_RESET_LINK=${ALLOW_DEV_RESET_LINK:-false}
    # Наружу только через nginx
    expose:
      - "5000"
    volumes:
      # docker.sock нужен, пока judge крутится внутри web (USE_DOCKER).
      # Долгосрочно: вынести выполнение только в celery_worker и убрать sock у web.
      - .:/app
      - /var/run/docker.sock:/var/run/docker.sock
    command: gunicorn -w 2 -b 0.0.0.0:5000 --timeout 120 main_postgres:app

  # Nginx балансировщик нагрузки
  nginx:
    image: nginx:alpine
    depends_on:
      - web
    ports:
      # Спец-порт вместо 80 (менее заметно, пока без домена/HTTPS)
      - "8088:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./static:/app/static:ro
      - ./static/uploads:/app/static/uploads:ro
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:


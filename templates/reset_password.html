{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock %}
{% block content %}
  <div class="panel auth-panel">
    <div class="auth-header">
      <h1>Новый пароль</h1>
      <p class="muted">Аккаунт @{{ username }}</p>
    </div>
    <form method="post" class="form" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label>
        Новый пароль
        <input type="password" name="password" required minlength="8" maxlength="128" autocomplete="new-password" />
      </label>
      <p class="field-hint muted">Минимум 8 символов, буква и цифра</p>
      <label>
        Повторите пароль
        <input type="password" name="password2" required minlength="8" maxlength="128" autocomplete="new-password" />
      </label>
      <div class="actions">
        <button type="submit" class="btn btn-block">Сохранить пароль</button>
      </div>
    </form>
  </div>
{% endblock %}

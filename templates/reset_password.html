{% extends 'base.html' %}
{% block title %}Код и новый пароль{% endblock %}
{% block content %}
  <div class="panel auth-panel">
    <div class="auth-header">
      <h1>Введите код</h1>
      <p class="muted">Код из письма действует 15 минут</p>
    </div>
    <form method="post" class="form" autocomplete="off">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label>
        Логин или email
        <input
          type="text"
          name="username"
          required
          autocomplete="username"
          value="{{ username_hint or '' }}"
          placeholder="логин или you@yandex.ru"
        />
      </label>
      <label>
        Код из письма
        <input
          type="text"
          name="code"
          required
          inputmode="numeric"
          pattern="[0-9]{6}"
          maxlength="6"
          minlength="6"
          autocomplete="one-time-code"
          placeholder="123456"
        />
      </label>
      <label>
        Новый пароль
        <input type="password" name="password" required minlength="8" maxlength="128" autocomplete="new-password" />
      </label>
      <p class="field-hint muted">Минимум 8 символов, буква и цифра</p>
      <label>
        Повторите пароль
        <input type="password" name="password2" required minlength="8" maxlength="128" autocomplete="new-password" />
      </label>
      <div class="actions">
        <button type="submit" class="btn btn-block">Сохранить пароль</button>
      </div>
    </form>
    <div class="auth-footer">
      <a href="{{ url_for('forgot_password') }}" class="btn secondary btn-block">Отправить код ещё раз</a>
    </div>
  </div>
{% endblock %}

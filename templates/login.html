{% extends 'base.html' %}
{% block title %}Вход{% endblock %}
{% block content %}
  <div class="login-page">
    <div class="panel" style="max-width: 400px; margin: 0 auto;">
    <div style="text-align: center; margin-bottom: 2rem;">
      <h1 style="margin-bottom: 0.5rem;">Добро пожаловать!</h1>
      <p class="muted">Войдите в свой аккаунт</p>
    </div>
    
    <form method="post" class="form">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/>
      <label>
        Логин или email
        <input type="text" name="username" required autocomplete="username" placeholder="логин или you@yandex.ru" />
      </label>
      <label>
        Пароль
        <input type="password" name="password" required autocomplete="current-password" placeholder="Введите пароль" />
      </label>
      <div class="actions">
        <button type="submit" class="btn" style="width: 100%; justify-content: center;">Войти</button>
      </div>
    </form>
    <p style="text-align:center; margin-top: 0.85rem;">
      <a href="{{ url_for('forgot_password') }}">Забыли пароль?</a>
    </p>
    
    <div style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border);">
      <p class="muted">Нет аккаунта?</p>
      <a href="{{ url_for('register') }}" class="btn secondary" style="width: 100%; justify-content: center;">Создать аккаунт</a>
    </div>
    </div>
  </div>
{% endblock %}
